<!-- AUDIO AUTOMÁTICO (optimzado para móvil + Instagram) -->
<audio 
  id="explicacion-audio" 
  src="TU-AUDIO.mp3" 
  autoplay 
  muted 
  playsinline 
  loop>
</audio>

<!-- Botón visible (se activa solo) -->
<button 
  id="play-btn"
  style="font-size: 28px; padding: 18px 40px; background: linear-gradient(90deg, #28a745, #20c997); color: white; border: none; border-radius: 50px; box-shadow: 0 8px 20px rgba(40, 167, 69, 0.3); cursor: pointer; margin: 20px auto; display: block;">
  ▶ ESCUCHAR EXPLICACIÓN RÁPIDA
</button>

<script>
  const audio = document.getElementById('explicacion-audio');
  const btn = document.getElementById('play-btn');

  // Autoplay automático al cargar (muted al principio → los navegadores lo permiten)
  window.addEventListener('load', () => {
    audio.play().catch(() => {});
  });

  // Al tocar la pantalla (o abrir desde Instagram) → se activa el sonido
  document.documentElement.addEventListener('touchstart', () => {
    if (audio.muted) {
      audio.muted = false;
      audio.play();
      btn.textContent = "🔊 REPRODUCIENDO...";
      btn.style.background = "#20c997";
    }
  }, { once: true }); // solo la primera vez

  // Si alguien toca el botón también funciona
  btn.addEventListener('click', () => {
    audio.muted = false;
    audio.play();
    btn.textContent = "🔊 REPRODUCIENDO...";
  });
</script>
