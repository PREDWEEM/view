<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PREDWEEM PRO</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body { font-family: sans-serif; }
.scene { display: none; }
.phone-frame {
    max-width: 420px;
    margin: auto;
    border: 14px solid #111;
    border-radius: 40px;
    overflow: hidden;
}
.overlay {
    background: rgba(0,0,0,0.6);
    padding: 12px;
    border-radius: 12px;
}
</style>
</head>

<body class="bg-black text-white flex items-center justify-center min-h-screen">

<div class="phone-frame bg-black">

<!-- ESCENAS -->
<div id="scene1" class="scene h-[600px] flex items-center justify-center text-center">
    <h1 class="text-4xl font-bold">¿Cómo funciona PREWIM?</h1>
</div>

<div id="scene2" class="scene h-[600px] flex items-center justify-center text-center">
    <div class="overlay">Ingresás fecha, temperatura y lluvia</div>
</div>

<div id="scene3" class="scene h-[600px] flex items-center justify-center text-center">
    <div class="overlay">Predicción + balance hídrico + grados día</div>
</div>

<div id="scene4" class="scene h-[600px] flex items-center justify-center text-center">
    <div class="overlay">Mapa de riesgo y curvas</div>
</div>

<div id="scene5" class="scene h-[600px] flex items-center justify-center text-center">
    <div class="overlay">Aplicás en el momento justo</div>
</div>

<div id="scene6" class="scene h-[600px] flex items-center justify-center text-center">
    <div>
        <h2 class="text-3xl font-bold">PROBALO</h2>
        <p class="mt-2">100% gratis</p>
    </div>
</div>

<!-- CONTROLES -->
<div class="p-4">
<button onclick="start()" class="w-full bg-green-500 py-4 rounded-xl text-xl font-bold">
▶ Escuchar explicación PRO
</button>
</div>

</div>

<script>
// 🎙️ TTS PRO (usa backend en /api/tts)
async function speak(text) {
    const res = await fetch("/api/tts", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ text })
    });

    const blob = await res.blob();
    const audio = new Audio(URL.createObjectURL(blob));
    await audio.play();
}

// 🎬 NARRACIÓN OPTIMIZADA ARGENTINA
const narracion = {
scene1: [
    "Hola.",
    "Te muestro cómo funciona PREWIM."
],
scene2: [
    "Ingresás cuatro datos por día.",
    "Fecha, temperatura máxima, mínima y lluvia."
],
scene3: [
    "Primero, una red neuronal predice la germinación.",
    "Después, se calcula el balance hídrico del suelo.",
    "Y un reloj térmico define la ventana óptima."
],
scene4: [
    "Ves un mapa de riesgo claro.",
    "Curvas interactivas y pronóstico.",
    "Todo en tiempo real."
],
scene5: [
    "Aplicás en el momento justo.",
    "Evitás resistencia.",
    "Ahorrás plata.",
    "Y cuidás el ambiente."
],
scene6: [
    "PREWIM ya está validado en campo.",
    "Es totalmente gratis.",
    "Probalo ahora."
]
};

// 🎬 CONTROL DE ESCENAS + AUDIO
async function playScene(id, textos) {
    document.querySelectorAll('.scene').forEach(s => s.style.display = 'none');
    document.getElementById(id).style.display = 'flex';

    for (let t of textos) {
        await speak(t);
        await new Promise(r => setTimeout(r, 300));
    }
}

// 🚀 SECUENCIA COMPLETA
async function start() {
    await playScene("scene1", narracion.scene1);
    await playScene("scene2", narracion.scene2);
    await playScene("scene3", narracion.scene3);
    await playScene("scene4", narracion.scene4);
    await playScene("scene5", narracion.scene5);
    await playScene("scene6", narracion.scene6);
}
</script>

</body>
</html>
